<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness AI - Your Personal Fitness Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .tagline {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 24px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .tab:hover {
            background: #e0e0e0;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            margin: 10px 0;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .metric-label {
            font-weight: 600;
            color: #555;
        }

        .metric-value {
            font-size: 1.2em;
            color: #667eea;
            font-weight: bold;
        }

        .workout-day {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 8px;
            border-left: 4px solid #764ba2;
        }

        .workout-day h3 {
            color: #764ba2;
            margin-bottom: 15px;
        }

        .exercise {
            padding: 10px;
            margin: 8px 0;
            background: #f8f9fa;
            border-radius: 6px;
        }

        .meal-section {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .meal-section h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .meal-option {
            padding: 12px;
            margin: 8px 0;
            background: #f8f9fa;
            border-radius: 6px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }

        .success.show {
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .tabs {
                flex-direction: column;
            }

            .tab {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💪 Fitness AI</h1>
            <p class="tagline">Your Personal AI-Powered Fitness & Nutrition Assistant</p>
        </header>

        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="showTab('register')">Register</button>
                <button class="tab" onclick="showTab('profile')">Create Profile</button>
                <button class="tab" onclick="showTab('metrics')">View Metrics</button>
                <button class="tab" onclick="showTab('workout')">Generate Workout</button>
                <button class="tab" onclick="showTab('diet')">Generate Diet Plan</button>
            </div>

            <!-- Register Tab -->
            <div id="register" class="tab-content active">
                <h2>Create Account</h2>
                <form onsubmit="registerUser(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="reg-email" required>
                    </div>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="reg-username" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="reg-password" required>
                    </div>
                    <button type="submit">Create Account</button>
                </form>
                <div class="success" id="register-success"></div>
                <div class="error" id="register-error"></div>
            </div>

            <!-- Profile Tab -->
            <div id="profile" class="tab-content">
                <h2>Create Your Profile</h2>
                <form onsubmit="createProfile(event)">
                    <div class="form-group">
                        <label>User ID (from registration)</label>
                        <input type="number" id="profile-user-id" required>
                    </div>
                    <div class="grid">
                        <div class="form-group">
                            <label>Age</label>
                            <input type="number" id="profile-age" required min="10" max="120">
                        </div>
                        <div class="form-group">
                            <label>Gender</label>
                            <select id="profile-gender" required>
                                <option value="">Select...</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid">
                        <div class="form-group">
                            <label>Height (cm)</label>
                            <input type="number" id="profile-height" required min="100" max="250" step="0.1">
                        </div>
                        <div class="form-group">
                            <label>Weight (kg)</label>
                            <input type="number" id="profile-weight" required min="30" max="300" step="0.1">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Activity Level</label>
                        <select id="profile-activity" required>
                            <option value="">Select...</option>
                            <option value="sedentary">Sedentary (little or no exercise)</option>
                            <option value="lightly_active">Lightly Active (1-3 days/week)</option>
                            <option value="moderately_active">Moderately Active (3-5 days/week)</option>
                            <option value="very_active">Very Active (6-7 days/week)</option>
                            <option value="extremely_active">Extremely Active (athlete)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Goal</label>
                        <select id="profile-goal" required>
                            <option value="">Select...</option>
                            <option value="lose_weight">Lose Weight</option>
                            <option value="maintain">Maintain Weight</option>
                            <option value="gain_muscle">Gain Muscle</option>
                        </select>
                    </div>
                    <button type="submit">Create Profile</button>
                </form>
                <div class="success" id="profile-success"></div>
                <div class="error" id="profile-error"></div>
            </div>

            <!-- Metrics Tab -->
            <div id="metrics" class="tab-content">
                <h2>Your Fitness Metrics</h2>
                <div class="form-group">
                    <label>User ID</label>
                    <input type="number" id="metrics-user-id" required>
                </div>
                <button onclick="getMetrics()">Calculate Metrics</button>
                <div class="loading" id="metrics-loading">
                    <div class="spinner"></div>
                    <p>Calculating...</p>
                </div>
                <div class="result" id="metrics-result"></div>
                <div class="error" id="metrics-error"></div>
            </div>

            <!-- Workout Tab -->
            <div id="workout" class="tab-content">
                <h2>Generate Workout Plan</h2>
                <div class="form-group">
                    <label>User ID</label>
                    <input type="number" id="workout-user-id" required>
                </div>
                <div class="form-group">
                    <label>Duration (weeks)</label>
                    <input type="number" id="workout-duration" value="8" min="4" max="16">
                </div>
                <button onclick="generateWorkout()">Generate Workout Plan</button>
                <div class="loading" id="workout-loading">
                    <div class="spinner"></div>
                    <p>Generating your personalized workout...</p>
                </div>
                <div class="result" id="workout-result"></div>
                <div class="error" id="workout-error"></div>
            </div>

            <!-- Diet Tab -->
            <div id="diet" class="tab-content">
                <h2>Generate Diet Plan</h2>
                <div class="form-group">
                    <label>User ID</label>
                    <input type="number" id="diet-user-id" required>
                </div>
                <button onclick="generateDiet()">Generate Diet Plan</button>
                <div class="loading" id="diet-loading">
                    <div class="spinner"></div>
                    <p>Creating your personalized diet plan...</p>
                </div>
                <div class="result" id="diet-result"></div>
                <div class="error" id="diet-error"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8486';

        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        function showSuccess(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        async function registerUser(event) {
            event.preventDefault();
            const data = {
                email: document.getElementById('reg-email').value,
                username: document.getElementById('reg-username').value,
                password: document.getElementById('reg-password').value
            };

            try {
                const response = await fetch(`${API_URL}/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const result = await response.json();
                    showSuccess('register-success', `Account created! Your User ID is: ${result.id}`);
                    event.target.reset();
                } else {
                    const error = await response.json();
                    showError('register-error', error.detail || 'Registration failed');
                }
            } catch (error) {
                showError('register-error', 'Network error. Make sure the backend is running.');
            }
        }

        async function createProfile(event) {
            event.preventDefault();
            const userId = document.getElementById('profile-user-id').value;
            const data = {
                age: parseInt(document.getElementById('profile-age').value),
                gender: document.getElementById('profile-gender').value,
                height: parseFloat(document.getElementById('profile-height').value),
                weight: parseFloat(document.getElementById('profile-weight').value),
                activity_level: document.getElementById('profile-activity').value,
                goal: document.getElementById('profile-goal').value
            };

            try {
                const response = await fetch(`${API_URL}/profile/${userId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    showSuccess('profile-success', 'Profile created successfully!');
                    event.target.reset();
                } else {
                    const error = await response.json();
                    showError('profile-error', error.detail || 'Profile creation failed');
                }
            } catch (error) {
                showError('profile-error', 'Network error. Make sure the backend is running.');
            }
        }

        async function getMetrics() {
            const userId = document.getElementById('metrics-user-id').value;
            if (!userId) return;

            document.getElementById('metrics-loading').classList.add('show');
            document.getElementById('metrics-result').classList.remove('show');

            try {
                const response = await fetch(`${API_URL}/metrics/${userId}`);
                
                if (response.ok) {
                    const data = await response.json();
                    displayMetrics(data);
                } else {
                    const error = await response.json();
                    showError('metrics-error', error.detail || 'Failed to fetch metrics');
                }
            } catch (error) {
                showError('metrics-error', 'Network error. Make sure the backend is running.');
            } finally {
                document.getElementById('metrics-loading').classList.remove('show');
            }
        }

        function displayMetrics(data) {
            const html = `
                <h3>Your Fitness Metrics</h3>
                <div class="metric">
                    <span class="metric-label">BMI</span>
                    <span class="metric-value">${data.bmi} (${data.bmi_category})</span>
                </div>
                <div class="metric">
                    <span class="metric-label">BMR (Basal Metabolic Rate)</span>
                    <span class="metric-value">${data.bmr} cal/day</span>
                </div>
                <div class="metric">
                    <span class="metric-label">TDEE (Total Daily Energy)</span>
                    <span class="metric-value">${data.tdee} cal/day</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Target Calories</span>
                    <span class="metric-value">${data.target_calories} cal/day</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Protein</span>
                    <span class="metric-value">${data.macros.protein}g/day</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Carbs</span>
                    <span class="metric-value">${data.macros.carbs}g/day</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Fats</span>
                    <span class="metric-value">${data.macros.fats}g/day</span>
                </div>
            `;
            document.getElementById('metrics-result').innerHTML = html;
            document.getElementById('metrics-result').classList.add('show');
        }

        async function generateWorkout() {
            const userId = document.getElementById('workout-user-id').value;
            const duration = document.getElementById('workout-duration').value;
            if (!userId) return;

            document.getElementById('workout-loading').classList.add('show');
            document.getElementById('workout-result').classList.remove('show');

            try {
                const response = await fetch(`${API_URL}/workout/${userId}?duration_weeks=${duration}`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    displayWorkout(data.plan);
                } else {
                    const error = await response.json();
                    showError('workout-error', error.detail || 'Failed to generate workout');
                }
            } catch (error) {
                showError('workout-error', 'Network error. Make sure the backend is running.');
            } finally {
                document.getElementById('workout-loading').classList.remove('show');
            }
        }

        function displayWorkout(plan) {
            let html = `
                <h3>${plan.title}</h3>
                <p><strong>Difficulty:</strong> ${plan.difficulty}</p>
                <p><strong>Duration:</strong> ${plan.duration_weeks} weeks</p>
                <p><strong>Progression:</strong> ${plan.progression}</p>
                <h4>Weekly Schedule:</h4>
            `;

            for (const [day, details] of Object.entries(plan.weekly_schedule)) {
                html += `
                    <div class="workout-day">
                        <h3>${day}</h3>
                        <p><strong>Focus:</strong> ${details.focus.join(', ')}</p>
                `;
                
                if (details.exercises && details.exercises.length > 0) {
                    details.exercises.forEach(exercise => {
                        if (exercise.sets) {
                            html += `
                                <div class="exercise">
                                    <strong>${exercise.name}</strong><br>
                                    ${exercise.sets} sets × ${exercise.reps} reps<br>
                                    Rest: ${exercise.rest}
                                </div>
                            `;
                        } else {
                            html += `
                                <div class="exercise">
                                    <strong>${exercise.name}</strong><br>
                                    ${exercise.description || ''}
                                </div>
                            `;
                        }
                    });
                }
                
                html += `</div>`;
            }

            html += `<h4>Tips:</h4><ul>`;
            plan.tips.forEach(tip => {
                html += `<li>${tip}</li>`;
            });
            html += `</ul>`;

            document.getElementById('workout-result').innerHTML = html;
            document.getElementById('workout-result').classList.add('show');
        }

        async function generateDiet() {
            const userId = document.getElementById('diet-user-id').value;
            if (!userId) return;

            document.getElementById('diet-loading').classList.add('show');
            document.getElementById('diet-result').classList.remove('show');

            try {
                const response = await fetch(`${API_URL}/diet/${userId}`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    displayDiet(data.plan);
                } else {
                    const error = await response.json();
                    showError('diet-error', error.detail || 'Failed to generate diet plan');
                }
            } catch (error) {
                showError('diet-error', 'Network error. Make sure the backend is running.');
            } finally {
                document.getElementById('diet-loading').classList.remove('show');
            }
        }

        function displayDiet(plan) {
            let html = `
                <h3>${plan.title}</h3>
                <p><strong>Daily Calories:</strong> ${plan.daily_calories} cal</p>
                <p><strong>Macros:</strong> Protein: ${plan.daily_macros.protein}g | Carbs: ${plan.daily_macros.carbs}g | Fats: ${plan.daily_macros.fats}g</p>
                <p><strong>Hydration:</strong> ${plan.hydration}</p>
                <h4>Meal Plan:</h4>
            `;

            for (const [mealType, details] of Object.entries(plan.meal_plan)) {
                html += `
                    <div class="meal-section">
                        <h3>${mealType.charAt(0).toUpperCase() + mealType.slice(1)}</h3>
                        <p><strong>Target:</strong> ${details.target_calories} cal | 
                           P: ${details.target_protein}g | C: ${details.target_carbs}g | F: ${details.target_fats}g</p>
                        <p><strong>Timing:</strong> ${plan.meal_timing[mealType]}</p>
                        <h4>Options:</h4>
                `;
                
                details.meal_options.forEach(meal => {
                    html += `
                        <div class="meal-option">
                            <strong>${meal.name}</strong><br>
                            ${meal.calories} cal | P: ${meal.protein}g | C: ${meal.carbs}g | F: ${meal.fats}g
                        </div>
                    `;
                });
                
                html += `</div>`;
            }

            html += `<h4>Tips:</h4><ul>`;
            plan.tips.forEach(tip => {
                html += `<li>${tip}</li>`;
            });
            html += `</ul>`;

            document.getElementById('diet-result').innerHTML = html;
            document.getElementById('diet-result').classList.add('show');
        }
    </script>
</body>
</html>
